# Rserve configuration for microbiomedb-mcp.
#
# Read by the standalone Rserve binary (R CMD Rserve --RS-conf ...). NOT
# by Rserve::run.Rserve(), which silently ignores most of these directives.
#
# Bound to the internal compose network only; the docker-compose file does
# not publish 6311 to the host. Defense-in-depth notes below.

# Listen on all interfaces inside the container (compose network only).
port 6311
# We DO want remote connections (the mcp service connects from another
# container) but the port is unreachable from outside the compose net.
remote enable

# Fork a fresh R process per client connection. Children COW-inherit the
# master's loaded packages -> sessions don't reload MicrobiomeDB/microbiomeData.
fork on-connect

# Plaintext is fine because the only network path is the compose-internal
# bridge. The public surface (Caddy -> mcp) is TLS+bearer; mcp is the only
# Rserve client.
plaintext enable
auth disable

# Don't allow control commands (server shutdown via protocol).
control disable

# File I/O: enabled so the mcp service can stream uploads/downloads via
# the shared volume. The mcp service is the only client and its public
# surface is gated by Caddy + bearer token.
# (Eval / R expression evaluation is on by default; the `eval` directive
# itself is for sourcing R expressions at startup, NOT a protocol toggle.)
fileio enable

# Stay in the foreground so docker manages the lifecycle and stdout/stderr
# go straight to container logs. Without this, Rserve daemonizes (forks
# and exits the parent) and the container immediately marks the entry
# process as gone.
daemon disable

# Pre-load packages and the mcp_* shim in the master process before any
# client connects. Forked children inherit this state via COW so curated
# data, MicrobiomeDB, and the handlers are ready instantly per session.
source /opt/microbiomedb-mcp/startup.R
